#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
exec-once = systemctl --user start hyprpolkitagent

exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XAUTHORITY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = hash dbus-update-activation-environment 2> /dev/null && dbus-update-activation-environment --systemd --all # for XDPH

exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

exec-once = nm-applet --indicator 
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = swaync

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


