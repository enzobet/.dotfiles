theme = "catppuccin_mocha"

[editor]
line-number = "relative"
cursorline = true
bufferline = "multiple"
mouse = true
scrolloff = 10
text-width = 100
atomic-save = false
default-yank-register = "+"
auto-format = false

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "version-control"]
center = ["file-modification-indicator", "file-name"]
right = ["position", "total-line-numbers", "diagnostics", "file-type"]
separator = "|"

[editor.indent-guides]
render = true
character = "┆" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 0

[editor.lsp]
enable = true
display-inlay-hints = true

[editor.soft-wrap]
enable = true

[keys.normal.space]
x = ":bc!" # Close the current buffer
v = ":vsplit"
h = ":hsplit"
